services:
  mysql:
    image: mysql:8.4
    container_name: english-grammar-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: english_grammar
    ports:
      - "3306:3306"
    volumes:
      - eg_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=caching_sha2_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  eg_mysql_data:
